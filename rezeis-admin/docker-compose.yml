# ══════════════════════════════════════════════════════════════════════════════
#  rezeis — docker-compose (production)
#
#  Runs in remnawave-network so rezeis can reach remnawave:3000 directly
#  and the same reverse proxy (Traefik/Caddy/Nginx) can route to rezeis:8000.
#
#  Сначала поднимается reverse-proxy-стек из ../deploy/proxies/<выбранный>/,
#  затем эта compose-запись. Все прокси слушают только :443 (без порта 80),
#  TLS на собственном сертификате (../deploy/proxies/gen-self-signed-cert.sh
#  или свой). Подробности — в ../deploy/proxies/README.md.
#
#  Usage:
#    docker compose up -d
#
#  Reverse proxy config (Caddy example):
#    reverse_proxy rezeis:8000
# ══════════════════════════════════════════════════════════════════════════════

services:
  rezeis:
    build: .
    container_name: rezeis
    hostname: rezeis
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_HOST: rezeis-db
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-rezeis}
      DATABASE_USER: ${DATABASE_USER:-rezeis}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD in .env to a generated value}
      # Force this documented stack to use DATABASE_* values instead of a stale
      # fixed DSN from an older .env file.
      DATABASE_URL: ''
      REDIS_HOST: rezeis-redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_NAME: ${REDIS_NAME:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env to a generated value}
      NODE_ENV: production
      RUID_PROCESS_ROLE: api
      BACKUP_LOCATION: /app/data/backups
      REZEIS_UPDATE_REPO: dizzzable/rezeis
    # Наружу 8000 не публикуем — reverse proxy ходит на rezeis:8000 по
    # docker-сети. Если нужен доступ с самого VPS для дебага, временно
    # верни строку: `ports: ['127.0.0.1:8000:8000']` (только loopback).
    expose:
      - '8000'
    # Раскомментируй блок ниже, если хочешь зайти в панель напрямую с
    # хоста (без reverse proxy) — порт публикуется только на loopback,
    # снаружи VPS не виден.
    # ports:
    #   - '127.0.0.1:8000:8000'
    volumes:
      - rezeis-data:/app/data
    depends_on:
      rezeis-db:
        condition: service_healthy
      rezeis-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '2.0'
        reservations:
          memory: 256M
    networks:
      - rezeis-private
      - remnawave-network

  rezeis-worker:
    build: .
    container_name: rezeis-worker
    hostname: rezeis-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_HOST: rezeis-db
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-rezeis}
      DATABASE_USER: ${DATABASE_USER:-rezeis}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD in .env to a generated value}
      DATABASE_URL: ''
      REDIS_HOST: rezeis-redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_NAME: ${REDIS_NAME:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env to a generated value}
      NODE_ENV: production
      RUID_PROCESS_ROLE: worker
      BACKUP_LOCATION: /app/data/backups
    command: ["node", "dist/worker.js"]
    volumes:
      - rezeis-data:/app/data
    depends_on:
      rezeis-db:
        condition: service_healthy
      rezeis-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e 'process.exit(0)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.5'
        reservations:
          memory: 128M
    networks:
      - rezeis-private
      - remnawave-network

  rezeis-db:
    # ВАЖНО: при апгрейде сюда (например `postgres:18-alpine`) обязательно
    # синхронно обновить `postgresql<major>-client` в Dockerfile rezeis-admin —
    # иначе `pg_dump` упадёт с "aborting because of server version mismatch"
    # при создании бэкапа.
    image: postgres:17-alpine
    container_name: rezeis-db
    hostname: rezeis-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-rezeis}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD in .env to a generated value}
      POSTGRES_DB: ${DATABASE_NAME:-rezeis}
    volumes:
      - rezeis-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    networks:
      - rezeis-private

  rezeis-redis:
    image: redis:7-alpine
    container_name: rezeis-redis
    hostname: rezeis-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env to a generated value}
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - volatile-lru
      - --save
      - '60'
      - '1000'
      - --appendonly
      - 'yes'
      - --appendfsync
      - everysec
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env to a generated value}
    volumes:
      - rezeis-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 576M
          cpus: '0.5'
        reservations:
          memory: 64M
    networks:
      - rezeis-private

volumes:
  rezeis-data:
  rezeis-db-data:
  rezeis-redis-data:

networks:
  rezeis-private:
    driver: bridge
    internal: true
  remnawave-network:
    name: remnawave-network
    driver: bridge
    external: true
