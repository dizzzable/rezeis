# ════════════════════════════════════════════════════════════════════════════
#  Nginx (combined) — ОДИН reverse proxy для rezeis + reiwa на ОДНОМ VPS
#  443-only, свой сертификат (bring-your-own, напр. SAN-cert от acme.sh).
#
#     PANEL_DOMAIN  →  rezeis:8000   (админка)
#     APP_DOMAIN    →  reiwa:5000    (кабинет / Mini App / webApp бота)
#
#  Наружу открыт ТОЛЬКО 443. Один SAN-сертификат на оба домена лежит рядом с
#  этим файлом (fullchain.pem + privkey.key) и монтируется read-only.
#
#  Выпуск (порт 80 нужен только на момент выпуска, прокси ещё не запущен):
#     apt update && apt install -y socat
#     curl https://get.acme.sh | sh
#     ~/.acme.sh/acme.sh --issue --standalone \
#         -d PANEL_DOMAIN -d APP_DOMAIN \
#         --key-file       /opt/rezeis/nginx/privkey.key \
#         --fullchain-file /opt/rezeis/nginx/fullchain.pem
#
#  Запуск:
#     cp nginx.conf.example nginx.conf   # подставить PANEL_DOMAIN / APP_DOMAIN
#     docker compose up -d
# ════════════════════════════════════════════════════════════════════════════

services:
  nginx:
    image: nginx:1.30
    container_name: rezeis-nginx
    hostname: rezeis-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - ./privkey.key:/etc/nginx/ssl/privkey.key:ro
    ports:
      - '0.0.0.0:443:443'
    networks:
      - remnawave-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

networks:
  remnawave-network:
    name: remnawave-network
    external: true
