# ════════════════════════════════════════════════════════════════════════════
#  Traefik reverse proxy (TLS via Let's Encrypt HTTP-01)
#
#  Traefik сам выпускает сертификат через ACME HTTP-01.
#  Открыты 80 и 443: 80 — только для challenge + редирект на 443.
#
#  Конфиг: статический в traefik.yml, динамический в config/rezeis.yml.
#
#  Порядок:
#    1. cp traefik.yml.example traefik.yml          → подставить email
#    2. cp config/rezeis.yml.example config/rezeis.yml → подставить домен
#    3. docker compose up -d
#    4. cd ../../../ && docker compose up -d   (поднять саму панель)
# ════════════════════════════════════════════════════════════════════════════

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - remnawave-network
    ports:
      - '0.0.0.0:80:80'
      - '0.0.0.0:443:443'
    environment:
      - TZ=UTC
    volumes:
      # Чтение docker-сокета нужно только если будете включать docker-провайдер.
      # По умолчанию мы используем file-провайдер, так что socket можно не монтировать.
      # - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - ./letsencrypt:/letsencrypt
      - ./config:/config:ro
      - ./logs:/var/log/traefik
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  remnawave-network:
    name: remnawave-network
    external: true
