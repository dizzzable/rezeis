name: Docker Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  # Required so the Trivy SARIF can be uploaded to GitHub code scanning.
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & push unified image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Lower-case repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Read package version
        id: version
        working-directory: rezeis-admin
        run: echo "value=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./rezeis-admin
          file: ./rezeis-admin/Dockerfile
          push: true
          # Single-manifest image (no provenance index) so Trivy can scan
          # the pushed image by its digest below.
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
            GIT_SHA=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          # Scan the exact pushed image by digest (always exists; avoids the
          # tag-mismatch that left no SARIF file).
          image-ref: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}@${{ steps.build.outputs.digest }}
          severity: 'CRITICAL,HIGH'
          # Report-only: the image is already published before this step, so
          # failing here would not un-publish it. Findings are surfaced in the
          # repository Security tab via the SARIF upload below.
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
