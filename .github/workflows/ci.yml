name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-quality:
    name: Backend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rezeis-admin
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: rezeis-admin/package-lock.json

      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run typecheck
      - run: npm run lint

  web-quality:
    name: Web quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rezeis-admin/web
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: rezeis-admin/web/package-lock.json

      - run: npm ci
      - run: npx tsc -p tsconfig.app.json --noEmit --incremental false
      - run: npm test
      - run: npm run lint
      - run: npm run build

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rezeis-admin
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: rezeis-admin/package-lock.json

      - run: npm ci
      - run: npm run prisma:generate
      - name: Run backend test suite
        run: npm test
