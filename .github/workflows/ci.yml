name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-quality:
    name: Backend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rezeis-admin
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: rezeis-admin/package-lock.json

      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run typecheck
      - run: npm run lint

  web-quality:
    name: Web quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rezeis-admin/web
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: rezeis-admin/web/package-lock.json

      - run: npm ci
      - run: npx tsc -p tsconfig.app.json --noEmit --incremental false
      - run: npm test
      - run: npm run lint
      - run: npm run build

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rezeis-admin
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: rezeis-admin/package-lock.json

      - run: npm ci
      - run: npm run prisma:generate
      - name: Run backend test suite
        run: npm test

  postgres-concurrency:
    name: PostgreSQL concurrency
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: rezeis_test
          POSTGRES_PASSWORD: rezeis_test
          POSTGRES_DB: rezeis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rezeis_test -d rezeis_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://rezeis_test:rezeis_test@127.0.0.1:5432/rezeis_test
      TEST_DATABASE_URL: postgresql://rezeis_test:rezeis_test@127.0.0.1:5432/rezeis_test
    defaults:
      run:
        working-directory: rezeis-admin
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: rezeis-admin/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npx prisma migrate deploy
      - run: node --require ts-node/register --test test/add-on-entitlement-postgres-concurrency.spec.ts
