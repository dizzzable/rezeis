# rezeis panel — Cloudflare Quick Tunnel (DEV / TESTING ONLY).
#
# DANGER: TryCloudflare (Quick Tunnels) is a trial feature with a 200
# in-flight connection cap and an ephemeral random hostname. Never use it
# in production — use Cloudflare Tunnel proper, or caddy/nginx/angie/traefik.
#
# After `docker compose up -d`, watch the logs for the generated
# https://*.trycloudflare.com URL and open it in the browser.

services:
  rezeis-try-cloudflare:
    container_name: rezeis-try-cloudflare
    hostname: rezeis-try-cloudflare
    image: cloudflare/cloudflared:2025.8.1
    networks:
      - remnawave-network
    restart: always
    command: tunnel --no-autoupdate --url http://rezeis:8000 rezeis-cf

networks:
  remnawave-network:
    name: remnawave-network
    driver: bridge
    external: true
