services:
  redis:
    image: redis:7-alpine
    container_name: ruid-redis
    env_file:
      - .env.external.user.example
    command:
      - sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD}" ]; then
          exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
        fi
        exec redis-server --appendonly yes
    volumes:
      - redis_external_user_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$${REDIS_PASSWORD}" ]; then
            redis-cli -a "$${REDIS_PASSWORD}" ping
          else
            redis-cli ping
          fi
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - rezeis-user-network

  ruid-api:
    build:
      context: ./ruid
      dockerfile: Dockerfile
    container_name: ruid-api
    env_file:
      - .env.external.user.example
    environment:
      PORT: 8000
    ports:
      - '127.0.0.1:8100:8000'
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request;urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - rezeis-user-network

  ruid-worker:
    build:
      context: ./ruid
      dockerfile: Dockerfile
    container_name: ruid-worker
    command: ['python', '-m', 'app.workers.main']
    env_file:
      - .env.external.user.example
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import pathlib;cmd=pathlib.Path('/proc/1/cmdline').read_text();raise SystemExit(0 if 'app.workers.main' in cmd else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - rezeis-user-network

  ruid-web:
    build:
      context: ./ruid/web
      dockerfile: Dockerfile
    container_name: ruid-web
    env_file:
      - .env.external.user.example
    environment:
      RUID_API_UPSTREAM: http://ruid-api:8000
    ports:
      - '127.0.0.1:3001:80'
    depends_on:
      ruid-api:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1/
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - rezeis-user-network

volumes:
  redis_external_user_data:

networks:
  rezeis-user-network:
    driver: bridge
