server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Demo: proxy /api/* to the rezeis-admin container so the SPA can use a
    # relative `baseURL: /api` (which is the production-style setup —
    # browser → nginx → backend over the docker network).
    #
    # WebSocket support for the realtime gateway and SSE streams is
    # enabled via Upgrade/Connection headers + buffering off so admin
    # clients receive events in real-time.
    location /api/ {
        proxy_pass http://rezeis-demo-admin:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_buffering off;
        proxy_read_timeout 1h;
        # Allow large multipart uploads (FAQ media — 25 MB limit).
        client_max_body_size 32M;
    }

    # User-uploaded media (FAQ photos/videos, etc.). Served by Nest's
    # static-asset middleware out of the admin container's local disk.
    # The `^~` modifier makes nginx prefer this prefix over the regex
    # `\.(js|css|png|…)$` location below — without it, files like
    # `/uploads/faq/foo.png` would route to the local-file static
    # location and 404.
    location ^~ /uploads/ {
        proxy_pass http://rezeis-demo-admin:8000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering on;
    }

    # WebSocket endpoint for the realtime gateway (Socket.IO).
    location /socket.io/ {
        proxy_pass http://rezeis-demo-admin:8000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # Static assets — long cache. Vite emits hashed file names so the
    # content can be considered immutable.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every other path returns index.html so client-side
    # routing handles it. `index.html` itself MUST NOT be cached, otherwise
    # browsers keep requesting hashed bundle names that no longer exist
    # after a deploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
        try_files /index.html =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
        try_files $uri $uri/ /index.html;
    }
}
